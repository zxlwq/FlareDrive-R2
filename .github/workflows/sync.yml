name: Sync Upstream main → main

on:
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨 1 点（UTC 时间）
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 设置 Git 用户信息
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: 克隆你的仓库
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0  # 拉取完整历史

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/willow-god/FlareDrive-R2.git

      - name: 拉取并合并 upstream/main 分支到本地 main
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main -m "🤖 自动同步上游 main 分支到本地 main"

      - name: 推送合并后的代码到你的仓库
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
