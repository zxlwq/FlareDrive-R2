name: Sync Upstream FlareDrive-R2 → main

on:
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨 1 点（UTC）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 设置 Git 身份
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: 克隆你的仓库
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0  # 拉取完整历史才能合并

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/willow-god/FlareDrive-R2.git

      - name: 拉取上游分支并合并到 main
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/FlareDrive-R2 --allow-unrelated-histories -m "🤖 自动同步上游 FlareDrive-R2 分支到 main"

      - name: 推送到你的 GitHub 仓库
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
